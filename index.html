<title>DESE — Inventario y Ventas</title>
<style>
  :root{
    --bg:#f6f4f5;
    --card:#ffffff;
    --ink:#1a1620;
    --muted:#85808d;
    --accent:#fe0008;
    --accent2:#ff5b52;
    --accent-dark:#c40006;
    --accent-soft:#fff1f0;
    --accent-soft2:#ffdedc;
    --ok:#149a66;
    --ok-bg:#e6f8ef;
    --danger:#e0131c;
    --danger-bg:#fdeceb;
    --border:#ececef;
    --radius:18px;
    --radius-sm:11px;
    --shadow-sm:0 2px 8px rgba(26,16,16,.05);
    --shadow-md:0 12px 28px -10px rgba(254,0,8,.22);
    --shadow-lift:0 22px 42px -16px rgba(254,0,8,.32);
    --ff-display:'Sora', system-ui, sans-serif;
    --ff-body:'Inter', system-ui, -apple-system, sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:var(--ff-body);
    background-color:var(--bg);
    background-image:
      radial-gradient(circle at 6% 4%, rgba(254,0,8,.07), transparent 42%),
      radial-gradient(circle at 96% 14%, rgba(254,0,8,.05), transparent 38%),
      radial-gradient(circle at 50% 100%, rgba(254,0,8,.04), transparent 45%);
    background-attachment:fixed;
    color:var(--ink);
  }
  header{
    background:rgba(255,255,255,.9);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border);
    padding:16px 28px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:12px;
    position:sticky;
    top:0;
    z-index:50;
  }
  header::after{
    content:'';
    position:absolute;
    left:0;right:0;bottom:-4px;
    height:4px;
    background:repeating-linear-gradient(115deg,
      var(--accent) 0 14px,
      var(--accent-dark) 14px 28px);
    background-size:200% 100%;
    animation:stripeSlide 7s linear infinite;
  }
  .brand{ display:flex; align-items:center; gap:13px; }
  .logo-badge{
    width:44px; height:44px;
    border-radius:12px;
    object-fit:cover;
    box-shadow:var(--shadow-md);
    transform:rotate(-5deg);
    transition:transform .35s cubic-bezier(.34,1.56,.64,1);
  }
  .brand:hover .logo-badge{ transform:rotate(0deg) scale(1.07); }
  header h1{
    font-family:var(--ff-display);
    font-weight:800;
    font-size:1.3rem;
    letter-spacing:-.01em;
    margin:0;
    display:flex;
    align-items:center;
    gap:10px;
  }
  header h1 span.tag{
    font-family:var(--ff-body);
    font-size:.68rem;
    background:linear-gradient(135deg, var(--accent), var(--accent-dark));
    color:#fff;
    padding:4px 9px;
    border-radius:6px;
    font-weight:700;
    letter-spacing:.05em;
    box-shadow:var(--shadow-sm);
  }
  .total-ventas{
    position:relative;
    overflow:hidden;
    background:linear-gradient(135deg,var(--ok-bg),#ffffff);
    color:var(--ok);
    font-family:var(--ff-display);
    font-weight:700;
    padding:9px 18px;
    border-radius:999px;
    font-size:.92rem;
    border:1px solid #cdeedd;
    box-shadow:var(--shadow-sm);
  }
  .total-ventas::before{
    content:'';
    position:absolute;
    top:0; left:-60%;
    width:40%; height:100%;
    background:linear-gradient(115deg, transparent, rgba(255,255,255,.85), transparent);
    animation:shine 4.5s ease-in-out infinite;
  }
  main{
    display:grid;
    grid-template-columns:1fr 360px;
    gap:24px;
    padding:26px 28px 48px;
    align-items:start;
  }
  @media (max-width: 880px){
    main{grid-template-columns:1fr;}
    .panel{position:static;}
  }
  .section-title{
    margin:0 0 4px;
    font-family:var(--ff-display);
    font-weight:800;
    font-size:1.2rem;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .section-title::before{
    content:'';
    display:inline-block;
    width:26px;height:4px;
    border-radius:2px;
    background:linear-gradient(90deg,var(--accent),var(--accent-dark));
    transform:skewX(-18deg);
  }
  .section-sub{
    margin:0 0 18px;
    color:var(--muted);
    font-size:.88rem;
  }
  .filtros{
    display:flex;
    gap:8px;
    margin-bottom:18px;
    flex-wrap:wrap;
  }
  .filtros button{
    border:1.5px solid var(--border);
    background:var(--card);
    padding:7px 15px;
    border-radius:999px;
    cursor:pointer;
    font-size:.85rem;
    font-weight:600;
    color:var(--muted);
    transition:all .22s ease;
  }
  .filtros button:hover{
    border-color:var(--accent-soft2);
    color:var(--accent-dark);
    transform:translateY(-1px);
  }
  .filtros button.activo{
    background:linear-gradient(135deg,var(--accent),var(--accent-dark));
    color:#fff;
    border-color:transparent;
    box-shadow:var(--shadow-md);
    transform:translateY(-1px) scale(1.03);
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(210px, 1fr));
    gap:18px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    position:relative;
    box-shadow:var(--shadow-sm);
    transition:transform .3s cubic-bezier(.2,.8,.2,1), box-shadow .3s ease, border-color .3s ease;
    animation:cardIn .45s ease backwards;
  }
  .grid .card:nth-child(1){animation-delay:.02s}
  .grid .card:nth-child(2){animation-delay:.05s}
  .grid .card:nth-child(3){animation-delay:.08s}
  .grid .card:nth-child(4){animation-delay:.11s}
  .grid .card:nth-child(5){animation-delay:.14s}
  .grid .card:nth-child(6){animation-delay:.17s}
  .grid .card:nth-child(7){animation-delay:.20s}
  .grid .card:nth-child(8){animation-delay:.23s}
  .grid .card:nth-child(n+9){animation-delay:.25s}
  .card::before{
    content:'';
    position:absolute;
    top:0; left:0; right:0;
    height:4px; width:0%;
    background:linear-gradient(90deg,var(--accent),var(--accent-dark));
    transition:width .35s ease;
  }
  .card:hover{
    transform:translateY(-6px);
    box-shadow:var(--shadow-lift);
    border-color:var(--accent-soft2);
  }
  .card:hover::before{ width:100%; }
  .card .icono{
    height:120px;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    background:radial-gradient(circle at 30% 25%, var(--accent-soft), #ffffff 72%);
  }
  .card .icono img{
    width:100%; height:100%;
    object-fit:cover;
    transition:transform .35s ease;
  }
  .card:hover .icono img{ transform:scale(1.06); }
  .card .icono svg{
    width:54px; height:54px;
    color:var(--accent);
    transition:transform .35s cubic-bezier(.34,1.56,.64,1);
  }
  .card:hover .icono svg{ transform:scale(1.12) rotate(-6deg); }
  .card .info{ padding:15px; display:flex; flex-direction:column; gap:6px; flex:1; }
  .card .cat{ font-size:.68rem; color:var(--accent-dark); font-weight:700; text-transform:uppercase; letter-spacing:.05em; }
  .card .nombre{ font-family:var(--ff-display); font-weight:700; font-size:.95rem; line-height:1.25; }
  .card .color{ color:var(--muted); font-size:.82rem; }
  .card .precio-stock{ display:flex; justify-content:space-between; align-items:center; margin-top:4px; }
  .card .precio{ color:var(--accent-dark); font-weight:700; }
  .stock-badge{ font-size:.72rem; padding:4px 9px; border-radius:7px; background:#f3f1f4; color:var(--muted); font-weight:600; }
  .stock-badge.agotado{ background:var(--danger-bg); color:var(--danger); animation:pulseSoft 2.2s ease-in-out infinite; }
  .card button{
    margin:0 15px 15px;
    padding:10px;
    border-radius:var(--radius-sm);
    border:1.5px solid var(--accent);
    background:#fff;
    color:var(--accent);
    font-weight:700;
    cursor:pointer;
    font-size:.85rem;
    transition:all .25s ease;
  }
  .card button:disabled{
    border-color:var(--border);
    color:#b7b3bb;
    background:#fafafa;
  }
  .card button:hover:not(:disabled){
    background:linear-gradient(135deg,var(--accent),var(--accent-dark));
    color:#fff;
    border-color:transparent;
    transform:translateY(-2px);
    box-shadow:var(--shadow-md);
  }
  .card button:active:not(:disabled){ transform:translateY(0) scale(.98); }

  .panel{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:22px 20px 20px;
    position:sticky;
    top:96px;
    box-shadow:var(--shadow-md);
    overflow:hidden;
  }
  .panel::before{
    content:'';
    position:absolute;
    top:0; left:0; right:0; height:5px;
    background:linear-gradient(90deg,var(--accent-dark),var(--accent),var(--accent-dark));
  }
  .panel h2{
    margin:0 0 16px;
    font-family:var(--ff-display);
    font-weight:800;
    font-size:1.05rem;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .panel h2::before{
    content:'';
    display:inline-block;
    width:22px;height:4px;
    border-radius:2px;
    background:linear-gradient(90deg,var(--accent),var(--accent-dark));
    transform:skewX(-18deg);
  }
  .carrito-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:11px 0;
    border-bottom:1px dashed var(--border);
    gap:10px;
  }
  .carrito-item .nom{ font-family:var(--ff-display); font-weight:700; font-size:.88rem; }
  .carrito-item .sub{ color:var(--muted); font-size:.78rem; margin-bottom:6px; }
  .precio-input{ display:flex; align-items:center; gap:4px; }
  .precio-input span{ color:var(--muted); font-size:.85rem; }
  .precio-input input{
    width:80px; padding:6px 8px; border-radius:8px; border:1.5px solid var(--border);
    font-size:.85rem; transition:border-color .2s, box-shadow .2s;
  }
  .precio-input input:focus{
    outline:none;
    border-color:var(--accent);
    box-shadow:0 0 0 3px var(--accent-soft);
  }
  .stepper{ display:flex; align-items:center; gap:6px; }
  .stepper button{
    width:27px; height:27px; border-radius:8px;
    border:1.5px solid var(--border); background:#fafafe; cursor:pointer;
    font-size:1rem; line-height:1; color:var(--ink);
    transition:all .2s ease;
  }
  .stepper button:hover{ background:var(--accent-soft); border-color:var(--accent); color:var(--accent-dark); }
  .stepper span{ min-width:18px; text-align:center; font-weight:700; }
  .vacio{ color:var(--muted); font-size:.85rem; padding:22px 0; text-align:center; }
  .vacio::before{ content:'🧺'; display:block; font-size:1.7rem; margin-bottom:8px; }
  .metodo-pago{ margin-top:16px; }
  .metodo-pago label{ font-size:.8rem; color:var(--muted); display:block; margin-bottom:6px; font-weight:600; }
  .metodo-pago select{
    width:100%; padding:10px; border-radius:var(--radius-sm); border:1.5px solid var(--border);
    font-size:.9rem; background:#fff; transition:border-color .2s;
  }
  .metodo-pago select:focus{ outline:none; border-color:var(--accent); }
  .subtotal-row{
    display:flex; justify-content:space-between; align-items:center;
    margin-top:18px; padding-top:15px; border-top:1px dashed var(--border);
    font-weight:700; font-size:1.05rem; font-family:var(--ff-display);
  }
  #subtotal{ color:var(--accent-dark); font-size:1.25rem; }
  .btn-completar{
    width:100%; margin-top:18px; padding:14px; border:none; border-radius:var(--radius-sm);
    background:linear-gradient(135deg,var(--ok),#0f7d52); color:#fff; font-weight:700; font-size:.95rem;
    cursor:pointer; font-family:var(--ff-display); transition:transform .2s ease, box-shadow .2s ease;
    box-shadow:0 10px 22px -10px rgba(20,154,102,.55);
  }
  .btn-completar::after{ content:' →'; display:inline-block; transition:transform .25s ease; }
  .btn-completar:hover:not(:disabled){
    transform:translateY(-2px);
    box-shadow:0 14px 28px -10px rgba(20,154,102,.65);
  }
  .btn-completar:hover:not(:disabled)::after{ transform:translateX(4px); }
  .btn-completar:active:not(:disabled){ transform:translateY(0); }
  .btn-completar:disabled{ background:#bcd8c9; box-shadow:none; cursor:not-allowed; }
  .msg{ margin-top:10px; font-size:.85rem; padding:9px 11px; border-radius:var(--radius-sm); display:none; font-weight:600; animation:slideIn .25s ease; }
  .msg.ok{ display:block; background:var(--ok-bg); color:var(--ok); }
  .msg.ok::before{ content:'✓ '; }
  .msg.error{ display:block; background:var(--danger-bg); color:var(--danger); }
  .msg.error::before{ content:'⚠ '; }
  .loading{ text-align:center; padding:44px; color:var(--muted); animation:pulseSoft 1.5s ease-in-out infinite; }

  @keyframes stripeSlide{ from{ background-position:0 0; } to{ background-position:-200% 0; } }
  @keyframes shine{ 0%{ left:-60%; } 100%{ left:140%; } }
  @keyframes pulseSoft{ 0%,100%{ opacity:1; } 50%{ opacity:.55; } }
  @keyframes cardIn{ from{ opacity:0; transform:translateY(14px); } to{ opacity:1; transform:translateY(0); } }
  @keyframes slideIn{ from{ opacity:0; transform:translateY(-4px); } to{ opacity:1; transform:translateY(0); } }

  @media (prefers-reduced-motion: reduce){
    *, *::before, *::after{
      animation-duration:.001ms !important;
      animation-iteration-count:1 !important;
      transition-duration:.001ms !important;
    }
  }

</style>
</head>
<body>

    <h1>DESE <span class="tag">Inventario</span></h1>
  </div>
  <div class="total-ventas" id="totalVentasBadge">Total Ventas: $0.00</div>
</header>

<main>
  <section>
    <h2 class="section-title">Inventario Disponible</h2>
    <p class="section-sub">Gestiona y vende productos de tu catálogo</p>
    <div class="filtros" id="filtros"></div>
    <div class="grid" id="grid">
      <div class="loading">Cargando inventario...</div>
    </div>
  </section>

  <aside class="panel">
    <h2>Nueva Venta</h2>
    <div id="carritoLista">
      <div class="vacio">Agrega productos del catálogo</div>
    </div>

    <div class="metodo-pago">
      <label>Método de pago</label>
      <select id="metodoPago">
        <option value="Efectivo">Efectivo</option>
        <option value="Tarjeta">Tarjeta</option>
        <option value="Transferencia">Transferencia</option>
        <option value="Yape/Plin">Yape / Plin</option>
      </select>
    </div>

    <div class="subtotal-row">
      <span>Subtotal</span>
      <span id="subtotal">$0.00</span>
    </div>

    <button class="btn-completar" id="btnCompletar" disabled>Completar Venta</button>
    <div class="msg" id="msg"></div>
  </aside>
</main>

<script>
// =======================================================
// CONFIGURACIÓN: pega aquí la URL de tu Apps Script
// =======================================================
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzbejzGJwfamRACH45c9oo0y-0XQNsLt408WgYtcPZlKXlUobNSdrm8eSAsZBqz62oJ/exec";

let inventario = [];
let carrito = []; // { categoria, modelo, color, precio, cantidad, stock }
let categoriaActiva = "Todos";

const iconos = {
  "Mochila": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7 8V6a5 5 0 0110 0v2" stroke-linecap="round"/><rect x="5" y="8" width="14" height="13" rx="2.5"/><path d="M9 12h6M9 16h6" stroke-linecap="round"/></svg>`,
  "Cartera": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="9" width="18" height="11" rx="2"/><path d="M8 9V7a2 2 0 012-2h4a2 2 0 012 2v2" stroke-linecap="round"/><circle cx="12" cy="14" r="1.2"/></svg>`,
  "Maletín": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="8" width="18" height="12" rx="2"/><path d="M9 8V6a2 2 0 012-2h2a2 2 0 012 2v2" stroke-linecap="round"/><path d="M3 13h18"/></svg>`
};
function iconoPara(cat){ return iconos[cat] || iconos["Mochila"]; }
function handleImgError(imgEl, categoria){
  imgEl.parentElement.innerHTML = iconoPara(categoria);
}

async function cargarInventario(){
  try{
    const res = await fetch(SCRIPT_URL);
    const data = await res.json();
    if(data.status === "ok"){
      inventario = data.productos;
      document.getElementById("totalVentasBadge").textContent =
        "Total Ventas: $" + Number(data.totalVentas || 0).toFixed(2);
      renderFiltros();
      renderGrid();
    } else {
      mostrarMsg("No se pudo cargar el inventario", "error");
    }
  } catch(err){
    document.getElementById("grid").innerHTML = '<div class="loading">Error al conectar con la hoja. Revisa la URL del script.</div>';
  }
}

function renderFiltros(){
  const categorias = ["Todos", ...new Set(inventario.map(p => p.categoria))];
  const cont = document.getElementById("filtros");
  cont.innerHTML = categorias.map(c =>
    `<button class="${c === categoriaActiva ? 'activo' : ''}" data-cat="${c}">${c}</button>`
  ).join("");
  cont.querySelectorAll("button").forEach(btn => {
    btn.addEventListener("click", () => {
      categoriaActiva = btn.dataset.cat;
      renderFiltros();
      renderGrid();
    });
  });
}

function renderGrid(){
  const grid = document.getElementById("grid");
  const lista = inventario.filter(p => categoriaActiva === "Todos" || p.categoria === categoriaActiva);

  if(lista.length === 0){
    grid.innerHTML = '<div class="loading">No hay productos en esta categoría</div>';
    return;
  }

  grid.innerHTML = lista.map((p, idx) => {
    const agotado = Number(p.stock) <= 0;
    return `
    <div class="card">
      <div class="icono">${p.foto ? `<img src="${p.foto}" alt="${p.modelo}" onerror="handleImgError(this, '${p.categoria}')">` : iconoPara(p.categoria)}</div>
      <div class="info">
        <span class="cat">${p.categoria}</span>
        <span class="nombre">${p.modelo}</span>
        <span class="color">${p.color}</span>
        <div class="precio-stock">
          <span class="stock-badge ${agotado ? 'agotado' : ''}">${agotado ? 'Agotado' : 'Stock: ' + p.stock}</span>
        </div>
      </div>
      <button data-idx="${idx}" ${agotado ? 'disabled' : ''}>${agotado ? 'Sin existencias' : 'Agregar a Venta'}</button>
    </div>`;
  }).join("");

  grid.querySelectorAll("button[data-idx]").forEach(btn => {
    btn.addEventListener("click", () => {
      const p = lista[btn.dataset.idx];
      agregarAlCarrito(p);
    });
  });
}

function agregarAlCarrito(p){
  const existente = carrito.find(it => it.categoria === p.categoria && it.modelo === p.modelo && it.color === p.color);
  if(existente){
    if(existente.cantidad < Number(p.stock)) existente.cantidad++;
  } else {
    carrito.push({
      categoria: p.categoria, modelo: p.modelo, color: p.color,
      precio: 0, cantidad: 1, stock: Number(p.stock)
    });
  }
  renderCarrito();
}

function cambiarCantidad(idx, delta){
  const item = carrito[idx];
  const nueva = item.cantidad + delta;
  if(nueva <= 0){
    carrito.splice(idx, 1);
  } else if(nueva <= item.stock){
    item.cantidad = nueva;
  }
  renderCarrito();
}

function renderCarrito(){
  const cont = document.getElementById("carritoLista");
  if(carrito.length === 0){
    cont.innerHTML = '<div class="vacio">Agrega productos del catálogo</div>';
  } else {
    cont.innerHTML = carrito.map((it, idx) => `
      <div class="carrito-item">
        <div>
          <div class="nom">${it.modelo}</div>
          <div class="sub">${it.color}</div>
          <div class="precio-input">
            <span>$</span>
            <input type="number" min="0" step="0.01" placeholder="Precio"
              value="${it.precio > 0 ? it.precio : ''}"
              oninput="actualizarPrecio(${idx}, this.value)">
          </div>
        </div>
        <div class="stepper">
          <button onclick="cambiarCantidad(${idx}, -1)">−</button>
          <span>${it.cantidad}</span>
          <button onclick="cambiarCantidad(${idx}, 1)">+</button>
        </div>
      </div>
    `).join("");
  }

  const subtotal = carrito.reduce((acc, it) => acc + it.precio * it.cantidad, 0);
  document.getElementById("subtotal").textContent = "$" + subtotal.toFixed(2);

  const hayPrecioFaltante = carrito.some(it => !it.precio || it.precio <= 0);
  document.getElementById("btnCompletar").disabled = carrito.length === 0 || hayPrecioFaltante;
}

function actualizarPrecio(idx, valor){
  carrito[idx].precio = Number(valor) || 0;
  const subtotal = carrito.reduce((acc, it) => acc + it.precio * it.cantidad, 0);
  document.getElementById("subtotal").textContent = "$" + subtotal.toFixed(2);
  const hayPrecioFaltante = carrito.some(it => !it.precio || it.precio <= 0);
  document.getElementById("btnCompletar").disabled = carrito.length === 0 || hayPrecioFaltante;
}

document.getElementById("btnCompletar").addEventListener("click", async () => {
  const btn = document.getElementById("btnCompletar");
  btn.disabled = true;
  btn.textContent = "Procesando...";

  const payload = {
    items: carrito.map(it => ({
      categoria: it.categoria, modelo: it.modelo, color: it.color,
      cantidad: it.cantidad, precio: it.precio
    })),
    metodoPago: document.getElementById("metodoPago").value
  };

  try{
    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" }, // evita problemas de CORS con Apps Script
      body: JSON.stringify(payload)
    });
    const data = await res.json();

    if(data.status === "ok"){
      mostrarMsg("Venta registrada correctamente", "ok");
      carrito = [];
      renderCarrito();
      await cargarInventario(); // refresca stock y total de ventas
    } else {
      mostrarMsg(data.message || "Error al registrar la venta", "error");
    }
  } catch(err){
    mostrarMsg("Error de conexión con la hoja", "error");
  }

  btn.textContent = "Completar Venta";
  renderCarrito();
});

function mostrarMsg(texto, tipo){
  const msg = document.getElementById("msg");
  msg.textContent = texto;
  msg.className = "msg " + tipo;
  setTimeout(() => { msg.className = "msg"; }, 4000);
}

cargarInventario();
</script>

</body>
</html>
