<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DESE — Inventario y Ventas</title>
<style>
  :root{
    --bg:#f5f6fa;
    --card:#ffffff;
    --ink:#1c1f2e;
    --muted:#6b7280;
    --accent:#5b5bf0;
    --accent-dark:#4747d1;
    --ok:#1e9e6f;
    --ok-bg:#e4f7ee;
    --danger:#e2483d;
    --border:#e7e8ee;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
    background:var(--bg);
    color:var(--ink);
  }
  header{
    background:var(--card);
    border-bottom:1px solid var(--border);
    padding:18px 28px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:12px;
  }
  header h1{
    font-size:1.25rem;
    margin:0;
    display:flex;
    align-items:center;
    gap:10px;
  }
  header h1 span.tag{
    font-size:.7rem;
    background:var(--accent);
    color:#fff;
    padding:3px 8px;
    border-radius:6px;
    font-weight:600;
    letter-spacing:.04em;
  }
  .total-ventas{
    background:var(--ok-bg);
    color:var(--ok);
    font-weight:700;
    padding:8px 16px;
    border-radius:999px;
    font-size:.95rem;
  }
  main{
    display:grid;
    grid-template-columns:1fr 360px;
    gap:24px;
    padding:24px 28px;
    align-items:start;
  }
  @media (max-width: 880px){
    main{grid-template-columns:1fr;}
  }
  .section-title{
    margin:0 0 4px;
    font-size:1.1rem;
  }
  .section-sub{
    margin:0 0 16px;
    color:var(--muted);
    font-size:.88rem;
  }
  .filtros{
    display:flex;
    gap:8px;
    margin-bottom:16px;
    flex-wrap:wrap;
  }
  .filtros button{
    border:1px solid var(--border);
    background:var(--card);
    padding:6px 14px;
    border-radius:999px;
    cursor:pointer;
    font-size:.85rem;
    color:var(--muted);
  }
  .filtros button.activo{
    background:var(--accent);
    color:#fff;
    border-color:var(--accent);
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(210px, 1fr));
    gap:16px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }
  .card .icono{
    height:120px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,#eef0fc,#f5f6fa);
  }
  .card .icono svg{ width:56px; height:56px; color:var(--accent); }
  .card .info{ padding:14px; display:flex; flex-direction:column; gap:6px; flex:1; }
  .card .cat{ font-size:.7rem; color:var(--accent); font-weight:700; text-transform:uppercase; letter-spacing:.04em; }
  .card .nombre{ font-weight:600; font-size:.95rem; line-height:1.25; }
  .card .color{ color:var(--muted); font-size:.82rem; }
  .card .precio-stock{ display:flex; justify-content:space-between; align-items:center; margin-top:4px; }
  .card .precio{ color:var(--accent-dark); font-weight:700; }
  .stock-badge{ font-size:.72rem; padding:3px 8px; border-radius:6px; background:#eef0f4; color:var(--muted); }
  .stock-badge.agotado{ background:#fdeceb; color:var(--danger); }
  .card button{
    margin:0 14px 14px;
    padding:9px;
    border-radius:8px;
    border:1px solid var(--accent);
    background:#fff;
    color:var(--accent);
    font-weight:600;
    cursor:pointer;
    font-size:.85rem;
  }
  .card button:disabled{
    border-color:var(--border);
    color:var(--muted);
    cursor:not-allowed;
  }
  .card button:hover:not(:disabled){ background:var(--accent); color:#fff; }

  .panel{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:20px;
    position:sticky;
    top:24px;
  }
  .panel h2{ margin:0 0 14px; font-size:1.05rem; }
  .carrito-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 0;
    border-bottom:1px solid var(--border);
    gap:10px;
  }
  .carrito-item .nom{ font-weight:600; font-size:.88rem; }
  .carrito-item .sub{ color:var(--muted); font-size:.78rem; margin-bottom:6px; }
  .precio-input{ display:flex; align-items:center; gap:4px; }
  .precio-input span{ color:var(--muted); font-size:.85rem; }
  .precio-input input{
    width:80px; padding:5px 7px; border-radius:6px; border:1px solid var(--border);
    font-size:.85rem;
  }
  .precio-input input:focus{ outline:none; border-color:var(--accent); }
  .stepper{ display:flex; align-items:center; gap:6px; }
  .stepper button{
    width:26px; height:26px; border-radius:6px;
    border:1px solid var(--border); background:#fafafe; cursor:pointer;
    font-size:1rem; line-height:1; color:var(--ink);
  }
  .stepper span{ min-width:18px; text-align:center; font-weight:600; }
  .vacio{ color:var(--muted); font-size:.85rem; padding:18px 0; text-align:center; }
  .metodo-pago{ margin-top:14px; }
  .metodo-pago label{ font-size:.8rem; color:var(--muted); display:block; margin-bottom:6px; }
  .metodo-pago select{
    width:100%; padding:9px; border-radius:8px; border:1px solid var(--border);
    font-size:.9rem; background:#fff;
  }
  .subtotal-row{
    display:flex; justify-content:space-between; align-items:center;
    margin-top:16px; padding-top:14px; border-top:1px dashed var(--border);
    font-weight:700; font-size:1.05rem;
  }
  .btn-completar{
    width:100%; margin-top:16px; padding:13px; border:none; border-radius:10px;
    background:var(--ok); color:#fff; font-weight:700; font-size:.95rem; cursor:pointer;
  }
  .btn-completar:disabled{ background:#a9c9bb; cursor:not-allowed; }
  .btn-completar:hover:not(:disabled){ background:#178058; }
  .msg{ margin-top:10px; font-size:.85rem; padding:8px 10px; border-radius:8px; display:none; }
  .msg.ok{ display:block; background:var(--ok-bg); color:var(--ok); }
  .msg.error{ display:block; background:#fdeceb; color:var(--danger); }
  .loading{ text-align:center; padding:40px; color:var(--muted); }
</style>
</head>
<body>

<header>
  <h1>📦 DESE <span class="tag">Inventario</span></h1>
  <div class="total-ventas" id="totalVentasBadge">Total Ventas: $0.00</div>
</header>

<main>
  <section>
    <h2 class="section-title">Inventario Disponible</h2>
    <p class="section-sub">Gestiona y vende productos de tu catálogo</p>
    <div class="filtros" id="filtros"></div>
    <div class="grid" id="grid">
      <div class="loading">Cargando inventario...</div>
    </div>
  </section>

  <aside class="panel">
    <h2>Nueva Venta</h2>
    <div id="carritoLista">
      <div class="vacio">Agrega productos del catálogo</div>
    </div>

    <div class="metodo-pago">
      <label>Método de pago</label>
      <select id="metodoPago">
        <option value="Efectivo">Efectivo</option>
        <option value="Tarjeta">Tarjeta</option>
        <option value="Transferencia">Transferencia</option>
        <option value="Yape/Plin">Yape / Plin</option>
      </select>
    </div>

    <div class="subtotal-row">
      <span>Subtotal</span>
      <span id="subtotal">$0.00</span>
    </div>

    <button class="btn-completar" id="btnCompletar" disabled>Completar Venta</button>
    <div class="msg" id="msg"></div>
  </aside>
</main>

<script>
// =======================================================
// CONFIGURACIÓN: pega aquí la URL de tu Apps Script
// =======================================================
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzbejzGJwfamRACH45c9oo0y-0XQNsLt408WgYtcPZlKXlUobNSdrm8eSAsZBqz62oJ/exec";

let inventario = [];
let carrito = []; // { categoria, modelo, color, precio, cantidad, stock }
let categoriaActiva = "Todos";

const iconos = {
  "Mochila": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7 8V6a5 5 0 0110 0v2" stroke-linecap="round"/><rect x="5" y="8" width="14" height="13" rx="2.5"/><path d="M9 12h6M9 16h6" stroke-linecap="round"/></svg>`,
  "Cartera": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="9" width="18" height="11" rx="2"/><path d="M8 9V7a2 2 0 012-2h4a2 2 0 012 2v2" stroke-linecap="round"/><circle cx="12" cy="14" r="1.2"/></svg>`,
  "Maletín": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="8" width="18" height="12" rx="2"/><path d="M9 8V6a2 2 0 012-2h2a2 2 0 012 2v2" stroke-linecap="round"/><path d="M3 13h18"/></svg>`
};
function iconoPara(cat){ return iconos[cat] || iconos["Mochila"]; }

async function cargarInventario(){
  try{
    const res = await fetch(SCRIPT_URL);
    const data = await res.json();
    if(data.status === "ok"){
      inventario = data.productos;
      document.getElementById("totalVentasBadge").textContent =
        "Total Ventas: $" + Number(data.totalVentas || 0).toFixed(2);
      renderFiltros();
      renderGrid();
    } else {
      mostrarMsg("No se pudo cargar el inventario", "error");
    }
  } catch(err){
    document.getElementById("grid").innerHTML = '<div class="loading">Error al conectar con la hoja. Revisa la URL del script.</div>';
  }
}

function renderFiltros(){
  const categorias = ["Todos", ...new Set(inventario.map(p => p.categoria))];
  const cont = document.getElementById("filtros");
  cont.innerHTML = categorias.map(c =>
    `<button class="${c === categoriaActiva ? 'activo' : ''}" data-cat="${c}">${c}</button>`
  ).join("");
  cont.querySelectorAll("button").forEach(btn => {
    btn.addEventListener("click", () => {
      categoriaActiva = btn.dataset.cat;
      renderFiltros();
      renderGrid();
    });
  });
}

function renderGrid(){
  const grid = document.getElementById("grid");
  const lista = inventario.filter(p => categoriaActiva === "Todos" || p.categoria === categoriaActiva);

  if(lista.length === 0){
    grid.innerHTML = '<div class="loading">No hay productos en esta categoría</div>';
    return;
  }

  grid.innerHTML = lista.map((p, idx) => {
    const agotado = Number(p.stock) <= 0;
    return `
    <div class="card">
      <div class="icono">${iconoPara(p.categoria)}</div>
      <div class="info">
        <span class="cat">${p.categoria}</span>
        <span class="nombre">${p.modelo}</span>
        <span class="color">${p.color}</span>
        <div class="precio-stock">
          <span class="stock-badge ${agotado ? 'agotado' : ''}">${agotado ? 'Agotado' : 'Stock: ' + p.stock}</span>
        </div>
      </div>
      <button data-idx="${idx}" ${agotado ? 'disabled' : ''}>${agotado ? 'Sin existencias' : 'Agregar a Venta'}</button>
    </div>`;
  }).join("");

  grid.querySelectorAll("button[data-idx]").forEach(btn => {
    btn.addEventListener("click", () => {
      const p = lista[btn.dataset.idx];
      agregarAlCarrito(p);
    });
  });
}

function agregarAlCarrito(p){
  const existente = carrito.find(it => it.categoria === p.categoria && it.modelo === p.modelo && it.color === p.color);
  if(existente){
    if(existente.cantidad < Number(p.stock)) existente.cantidad++;
  } else {
    carrito.push({
      categoria: p.categoria, modelo: p.modelo, color: p.color,
      precio: 0, cantidad: 1, stock: Number(p.stock)
    });
  }
  renderCarrito();
}

function cambiarCantidad(idx, delta){
  const item = carrito[idx];
  const nueva = item.cantidad + delta;
  if(nueva <= 0){
    carrito.splice(idx, 1);
  } else if(nueva <= item.stock){
    item.cantidad = nueva;
  }
  renderCarrito();
}

function renderCarrito(){
  const cont = document.getElementById("carritoLista");
  if(carrito.length === 0){
    cont.innerHTML = '<div class="vacio">Agrega productos del catálogo</div>';
  } else {
    cont.innerHTML = carrito.map((it, idx) => `
      <div class="carrito-item">
        <div>
          <div class="nom">${it.modelo}</div>
          <div class="sub">${it.color}</div>
          <div class="precio-input">
            <span>$</span>
            <input type="number" min="0" step="0.01" placeholder="Precio"
              value="${it.precio > 0 ? it.precio : ''}"
              oninput="actualizarPrecio(${idx}, this.value)">
          </div>
        </div>
        <div class="stepper">
          <button onclick="cambiarCantidad(${idx}, -1)">−</button>
          <span>${it.cantidad}</span>
          <button onclick="cambiarCantidad(${idx}, 1)">+</button>
        </div>
      </div>
    `).join("");
  }

  const subtotal = carrito.reduce((acc, it) => acc + it.precio * it.cantidad, 0);
  document.getElementById("subtotal").textContent = "$" + subtotal.toFixed(2);

  const hayPrecioFaltante = carrito.some(it => !it.precio || it.precio <= 0);
  document.getElementById("btnCompletar").disabled = carrito.length === 0 || hayPrecioFaltante;
}

function actualizarPrecio(idx, valor){
  carrito[idx].precio = Number(valor) || 0;
  const subtotal = carrito.reduce((acc, it) => acc + it.precio * it.cantidad, 0);
  document.getElementById("subtotal").textContent = "$" + subtotal.toFixed(2);
  const hayPrecioFaltante = carrito.some(it => !it.precio || it.precio <= 0);
  document.getElementById("btnCompletar").disabled = carrito.length === 0 || hayPrecioFaltante;
}

document.getElementById("btnCompletar").addEventListener("click", async () => {
  const btn = document.getElementById("btnCompletar");
  btn.disabled = true;
  btn.textContent = "Procesando...";

  const payload = {
    items: carrito.map(it => ({
      categoria: it.categoria, modelo: it.modelo, color: it.color,
      cantidad: it.cantidad, precio: it.precio
    })),
    metodoPago: document.getElementById("metodoPago").value
  };

  try{
    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" }, // evita problemas de CORS con Apps Script
      body: JSON.stringify(payload)
    });
    const data = await res.json();

    if(data.status === "ok"){
      mostrarMsg("Venta registrada correctamente", "ok");
      carrito = [];
      renderCarrito();
      await cargarInventario(); // refresca stock y total de ventas
    } else {
      mostrarMsg(data.message || "Error al registrar la venta", "error");
    }
  } catch(err){
    mostrarMsg("Error de conexión con la hoja", "error");
  }

  btn.textContent = "Completar Venta";
  renderCarrito();
});

function mostrarMsg(texto, tipo){
  const msg = document.getElementById("msg");
  msg.textContent = texto;
  msg.className = "msg " + tipo;
  setTimeout(() => { msg.className = "msg"; }, 4000);
}

cargarInventario();
</script>

</body>
</html>
